name: PR Review Judge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  static-deny:
    name: Static deny (critical paths)
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      denied: ${{ steps.filter.outputs.critical }}
      matched: ${{ steps.filter.outputs.critical_files }}
    steps:
      # -----------------------------------------------------------
      # Add critical path globs here. Any PR touching a matching
      # file will be marked `needs-human-review` unconditionally.
      # -----------------------------------------------------------
      - name: Match against critical path globs
        uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: shell
          filters: |
            critical:
              - '.github/workflows/**'

  static-allow:
    name: Static allow (trivial paths)
    needs: static-deny
    if: needs.static-deny.outputs.denied == 'false'
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      # -----------------------------------------------------------
      # Add trivial path globs to the `trivial` filter below. A PR
      # whose changed files are all covered by `trivial` is marked
      # `skip-human-review` without calling Claude.
      # The `all` filter is a catch-all used for the subset check.
      # -----------------------------------------------------------
      - name: Match against trivial path globs
        uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: json
          filters: |
            all:
              - '**'
            trivial:
              - '**/*.md'
              - 'public/**'
              - '.gitignore'

      - name: Subset check (all files in trivial list?)
        id: check
        env:
          ALL_JSON: ${{ steps.filter.outputs.all_files }}
          TRIVIAL_JSON: ${{ steps.filter.outputs.trivial_files }}
        run: |
          ALL_COUNT=$(jq 'length' <<< "$ALL_JSON")
          TRIVIAL_COUNT=$(jq 'length' <<< "$TRIVIAL_JSON")
          echo "changed files: $ALL_COUNT, trivial matches: $TRIVIAL_COUNT"

          if [ "$ALL_COUNT" -gt 0 ] && [ "$ALL_COUNT" = "$TRIVIAL_COUNT" ]; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
          else
            echo "approved=false" >> "$GITHUB_OUTPUT"
          fi

  dynamic-judge:
    name: Dynamic judge (Claude)
    needs: [static-deny, static-allow]
    if: >
      needs.static-deny.outputs.denied == 'false' &&
      needs.static-allow.outputs.approved == 'false'
    runs-on: ubuntu-latest
    outputs:
      needs_review: ${{ steps.read.outputs.needs_review }}
      impact: ${{ steps.read.outputs.impact }}
      reason: ${{ steps.read.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load prompt
        id: load_prompt
        run: |
          {
            echo "content<<PROMPT_EOF"
            cat .github/pr-review/dynamic-judge.md
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude review judge
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ steps.load_prompt.outputs.content }}
          claude_args: '--model claude-haiku-4-5 --allowed-tools "Read,Write,Bash(gh pr diff:*)"'

      - name: Read Claude result
        id: read
        run: |
          if [ ! -f /tmp/pr-review-result.json ]; then
            echo "Claude did not produce /tmp/pr-review-result.json" >&2
            exit 1
          fi

          cat /tmp/pr-review-result.json

          NEEDS_REVIEW=$(jq -r .needs_review /tmp/pr-review-result.json)
          IMPACT=$(jq -r .impact /tmp/pr-review-result.json)
          REASON=$(jq -r .reason /tmp/pr-review-result.json)

          echo "needs_review=$NEEDS_REVIEW" >> "$GITHUB_OUTPUT"
          echo "impact=$IMPACT" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

  post-review-status:
    name: Post review status to PR
    needs: [static-deny, static-allow, dynamic-judge]
    if: >
      always() &&
      (needs.static-deny.outputs.denied == 'true' ||
       needs.static-allow.outputs.approved == 'true' ||
       needs.dynamic-judge.outputs.needs_review != '')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for scripts)
        uses: actions/checkout@v4

      - name: Post review status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          DENY_DENIED: ${{ needs.static-deny.outputs.denied }}
          DENY_MATCHED: ${{ needs.static-deny.outputs.matched }}
          ALLOW_APPROVED: ${{ needs.static-allow.outputs.approved }}
          DYNAMIC_NEEDS_REVIEW: ${{ needs.dynamic-judge.outputs.needs_review }}
          DYNAMIC_IMPACT: ${{ needs.dynamic-judge.outputs.impact }}
          DYNAMIC_REASON: ${{ needs.dynamic-judge.outputs.reason }}
        run: |
          chmod +x .github/scripts/post-review-status.sh
          .github/scripts/post-review-status.sh
