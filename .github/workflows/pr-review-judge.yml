name: PR Review Judge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  static-deny:
    name: Static deny (critical paths)
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      denied: ${{ steps.check.outputs.denied }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: check
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin "$BASE_REF" --depth=1
          CHANGED=$(git diff --name-only "origin/$BASE_REF...HEAD")
          echo "Changed files:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -E '^\.github/workflows/' >/dev/null; then
            echo "denied=true" >> "$GITHUB_OUTPUT"
            echo "reason=ワークフローファイル (.github/workflows/**) の変更は必ず人間レビューが必要です。" >> "$GITHUB_OUTPUT"
          else
            echo "denied=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure labels exist
        if: steps.check.outputs.denied == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create needs-human-review --color B60205 --description "人間レビュー必須" 2>/dev/null || true
          gh label create skip-human-review --color 0E8A16 --description "人間レビュー不要" 2>/dev/null || true

      - name: Dedup, label, comment
        if: steps.check.outputs.denied == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
          REASON: ${{ steps.check.outputs.reason }}
        run: |
          SHORT_SHA="${HEAD_SHA:0:7}"

          # Delete existing judge comments (marker-based dedup)
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | contains("<!-- pr-review-judge -->")) | .id' \
            | while read -r id; do
                [ -n "$id" ] && gh api -X DELETE "repos/$REPO/issues/comments/$id"
              done

          # Swap labels
          gh pr edit "$PR_NUMBER" --remove-label skip-human-review 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --add-label needs-human-review

          # Post new comment
          gh pr comment "$PR_NUMBER" --body "$(cat <<EOF
          <!-- pr-review-judge -->
          🔒 **Static deny (critical paths)**
          - Commit: \`$SHORT_SHA\`
          - 判定: needs-human-review
          - 理由: $REASON
          EOF
          )"

  static-allow:
    name: Static allow (trivial paths)
    needs: static-deny
    if: needs.static-deny.outputs.denied == 'false'
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: check
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin "$BASE_REF" --depth=1
          CHANGED=$(git diff --name-only "origin/$BASE_REF...HEAD")
          echo "Changed files:"
          echo "$CHANGED"

          # Whitelist: *.md, public/**, .gitignore
          UNSAFE=$(echo "$CHANGED" | grep -vE '(^|/)[^/]+\.md$|^public/|^\.gitignore$' || true)

          if [ -z "$CHANGED" ]; then
            echo "approved=false" >> "$GITHUB_OUTPUT"
          elif [ -z "$UNSAFE" ]; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
          else
            echo "approved=false" >> "$GITHUB_OUTPUT"
            echo "Files outside whitelist:"
            echo "$UNSAFE"
          fi

      - name: Ensure labels exist
        if: steps.check.outputs.approved == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create needs-human-review --color B60205 --description "人間レビュー必須" 2>/dev/null || true
          gh label create skip-human-review --color 0E8A16 --description "人間レビュー不要" 2>/dev/null || true

      - name: Dedup, label, comment
        if: steps.check.outputs.approved == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          SHORT_SHA="${HEAD_SHA:0:7}"

          gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | contains("<!-- pr-review-judge -->")) | .id' \
            | while read -r id; do
                [ -n "$id" ] && gh api -X DELETE "repos/$REPO/issues/comments/$id"
              done

          gh pr edit "$PR_NUMBER" --remove-label needs-human-review 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --add-label skip-human-review

          gh pr comment "$PR_NUMBER" --body "$(cat <<EOF
          <!-- pr-review-judge -->
          ✅ **Static allow (trivial paths)**
          - Commit: \`$SHORT_SHA\`
          - 判定: skip-human-review
          - 理由: 全変更ファイルが whitelist (\`**/*.md\`, \`public/**\`, \`.gitignore\`) 内に収まっています。
          EOF
          )"

  dynamic-judge:
    name: Dynamic judge (Claude)
    needs: [static-deny, static-allow]
    if: >
      needs.static-deny.outputs.denied == 'false' &&
      needs.static-allow.outputs.approved == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create needs-human-review --color B60205 --description "人間レビュー必須" 2>/dev/null || true
          gh label create skip-human-review --color 0E8A16 --description "人間レビュー不要" 2>/dev/null || true

      - name: Run Claude review judge
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            あなたは nekomeshi リポジトリの PR レビュー判定ボットです。以下の手順で作業してください。

            1. `.github/pr-review-criteria.md` を Read ツールで読み込み、判定基準を把握する
            2. `gh pr diff $PR_NUMBER` を実行して PR の変更内容を取得する
            3. 基準に沿って影響レベル (low / medium / high) と判定 (skip-human-review / needs-human-review) を決める
            4. 既存の判定コメントを削除する (PR に残すのは常に最新の 1 件だけにしたい):
               - 既存コメント ID を取得: `gh api "repos/$REPO/issues/$PR_NUMBER/comments" --jq '.[] | select(.body | contains("<!-- pr-review-judge -->")) | .id'`
               - ヒットした各 ID に対して削除: `gh api -X DELETE "repos/$REPO/issues/comments/<id>"`
               - 既存コメントが無ければスキップして良い
            5. ラベルを更新する (反対側ラベルを外してから新ラベルを付与):
               - skip-human-review の場合: `gh pr edit $PR_NUMBER --remove-label needs-human-review --add-label skip-human-review`
               - needs-human-review の場合: `gh pr edit $PR_NUMBER --remove-label skip-human-review --add-label needs-human-review`
               - `--remove-label` は対象ラベルが PR に付いていなければエラーになるので、その場合はエラーを無視して `--add-label` のみを再実行してよい
            6. 新しい判定コメントを投稿する。必ず先頭行に HTML マーカー `<!-- pr-review-judge -->` を入れ、本文に commit の先頭 7 文字の SHA を含めること。短縮 SHA は `$HEAD_SHA` の先頭 7 文字を使う。

            コメント本文フォーマット (この通りに投稿):
            ```
            <!-- pr-review-judge -->
            🤖 **Dynamic judge (Claude)**
            - Commit: `<short-sha>`
            - 影響レベル: <low|medium|high>
            - 判定: <skip-human-review|needs-human-review>
            - 理由: <2-3行で簡潔に>
            ```

            判断に迷った場合は必ず needs-human-review を選んでください。
          claude_args: '--model claude-haiku-4-5 --allowed-tools "Read,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr edit:*),Bash(gh pr comment:*),Bash(gh api:*)"'
