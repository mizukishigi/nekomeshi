name: PR Review Judge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  preflight:
    name: Preflight (skip draft PRs)
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - run: echo "PR is not draft. Proceeding to judgment."

  static-deny:
    name: Static deny (critical paths)
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      denied: ${{ steps.check.outputs.denied }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: check
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin "$BASE_REF" --depth=1
          CHANGED=$(git diff --name-only "origin/$BASE_REF...HEAD")
          echo "Changed files:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -E '^\.github/workflows/' >/dev/null; then
            echo "denied=true" >> "$GITHUB_OUTPUT"
            echo "reason=ワークフローファイル (.github/workflows/**) の変更は必ず人間レビューが必要です" >> "$GITHUB_OUTPUT"
          else
            echo "denied=false" >> "$GITHUB_OUTPUT"
          fi

  static-allow:
    name: Static allow (trivial paths)
    needs: static-deny
    if: needs.static-deny.outputs.denied == 'false'
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: check
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin "$BASE_REF" --depth=1
          CHANGED=$(git diff --name-only "origin/$BASE_REF...HEAD")
          echo "Changed files:"
          echo "$CHANGED"

          # Whitelist: **/*.md, public/**, .gitignore
          UNSAFE=$(echo "$CHANGED" | grep -vE '(^|/)[^/]+\.md$|^public/|^\.gitignore$' || true)

          if [ -z "$CHANGED" ]; then
            echo "approved=false" >> "$GITHUB_OUTPUT"
          elif [ -z "$UNSAFE" ]; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
          else
            echo "approved=false" >> "$GITHUB_OUTPUT"
            echo "Files outside whitelist:"
            echo "$UNSAFE"
          fi

  dynamic-judge:
    name: Dynamic judge (Claude)
    needs: [static-deny, static-allow]
    if: >
      needs.static-deny.outputs.denied == 'false' &&
      needs.static-allow.outputs.approved == 'false'
    runs-on: ubuntu-latest
    outputs:
      verdict: ${{ steps.read.outputs.verdict }}
      impact: ${{ steps.read.outputs.impact }}
      reason: ${{ steps.read.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude review judge
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            あなたは nekomeshi リポジトリの PR レビュー判定ボットです。
            ラベル操作・コメント投稿は後続の job が行うので、あなたは判定結果を JSON ファイルに書き出すだけで終了してください。

            手順:
            1. `.github/pr-review-criteria.md` を Read ツールで読み込み、判定基準を把握する
            2. `gh pr diff $PR_NUMBER` を実行して PR の変更内容を取得する
            3. 基準に沿って影響レベル (low / medium / high) と判定 (skip-human-review / needs-human-review) を決める
            4. 判定結果を Write ツールで `/tmp/claude-verdict.json` に以下の形式で書き出す:

            ```json
            {
              "impact": "low",
              "verdict": "skip-human-review",
              "reason": "ここに理由を改行なしの日本語 1 行で"
            }
            ```

            制約:
            - `reason` には改行を含めない (1 行の日本語で簡潔に)
            - 判断に迷ったら必ず `needs-human-review` を選ぶ
            - ラベル付与・コメント投稿・gh api は一切呼び出さない (後続 job の責務)
          claude_args: '--model claude-haiku-4-5 --allowed-tools "Read,Write,Bash(gh pr diff:*)"'

      - name: Read verdict
        id: read
        run: |
          if [ ! -f /tmp/claude-verdict.json ]; then
            echo "Claude did not produce /tmp/claude-verdict.json" >&2
            exit 1
          fi

          cat /tmp/claude-verdict.json

          VERDICT=$(jq -r .verdict /tmp/claude-verdict.json)
          IMPACT=$(jq -r .impact /tmp/claude-verdict.json)
          REASON=$(jq -r .reason /tmp/claude-verdict.json)

          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "impact=$IMPACT" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

  apply-result:
    name: Apply judgment to PR
    needs: [static-deny, static-allow, dynamic-judge]
    if: >
      always() &&
      (needs.static-deny.outputs.denied == 'true' ||
       needs.static-allow.outputs.approved == 'true' ||
       needs.dynamic-judge.outputs.verdict != '')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for scripts)
        uses: actions/checkout@v4

      - name: Apply judgment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          DENY_DENIED: ${{ needs.static-deny.outputs.denied }}
          DENY_REASON: ${{ needs.static-deny.outputs.reason }}
          ALLOW_APPROVED: ${{ needs.static-allow.outputs.approved }}
          DYNAMIC_VERDICT: ${{ needs.dynamic-judge.outputs.verdict }}
          DYNAMIC_IMPACT: ${{ needs.dynamic-judge.outputs.impact }}
          DYNAMIC_REASON: ${{ needs.dynamic-judge.outputs.reason }}
        run: |
          chmod +x .github/scripts/apply-judgment.sh
          .github/scripts/apply-judgment.sh
