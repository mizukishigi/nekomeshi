name: PR Review Judge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

# ------------------------------------------------------------------
# PR path rules
#   Edit the pattern lists below to adjust which files are treated as
#   critical (always needs human review) or trivial (auto-approved).
#   Each line is an ERE regex matched against changed file paths.
# ------------------------------------------------------------------
env:
  DENY_PATTERNS: |
    ^\.github/workflows/
  ALLOW_PATTERNS: |
    (^|/)[^/]+\.md$
    ^public/
    ^\.gitignore$

jobs:
  static-deny:
    name: Static deny (critical paths)
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      denied: ${{ steps.check.outputs.denied }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - name: Match against DENY_PATTERNS
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          CHANGED=$(gh pr diff "$PR_NUMBER" --name-only)
          echo "Changed files:"
          echo "$CHANGED"

          DENY_REGEX=$(echo "$DENY_PATTERNS" | grep -vE '^$' | paste -sd '|' -)

          if [ -n "$DENY_REGEX" ] && echo "$CHANGED" | grep -E "$DENY_REGEX" >/dev/null; then
            MATCHED=$(echo "$CHANGED" | grep -E "$DENY_REGEX" | head -3 | tr '\n' ' ' | sed 's/ $//')
            echo "denied=true" >> "$GITHUB_OUTPUT"
            echo "reason=critical path への変更があります: $MATCHED" >> "$GITHUB_OUTPUT"
          else
            echo "denied=false" >> "$GITHUB_OUTPUT"
          fi

  static-allow:
    name: Static allow (trivial paths)
    needs: static-deny
    if: needs.static-deny.outputs.denied == 'false'
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - name: Match against ALLOW_PATTERNS
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          CHANGED=$(gh pr diff "$PR_NUMBER" --name-only)
          echo "Changed files:"
          echo "$CHANGED"

          ALLOW_REGEX=$(echo "$ALLOW_PATTERNS" | grep -vE '^$' | paste -sd '|' -)

          if [ -z "$CHANGED" ] || [ -z "$ALLOW_REGEX" ]; then
            echo "approved=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          UNSAFE=$(echo "$CHANGED" | grep -vE "$ALLOW_REGEX" || true)

          if [ -z "$UNSAFE" ]; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
          else
            echo "approved=false" >> "$GITHUB_OUTPUT"
            echo "Files outside whitelist:"
            echo "$UNSAFE"
          fi

  dynamic-judge:
    name: Dynamic judge (Claude)
    needs: [static-deny, static-allow]
    if: >
      needs.static-deny.outputs.denied == 'false' &&
      needs.static-allow.outputs.approved == 'false'
    runs-on: ubuntu-latest
    outputs:
      needs_review: ${{ steps.read.outputs.needs_review }}
      impact: ${{ steps.read.outputs.impact }}
      reason: ${{ steps.read.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load prompt
        id: load_prompt
        run: |
          {
            echo "content<<PROMPT_EOF"
            cat .github/pr-review/dynamic-judge.md
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude review judge
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ steps.load_prompt.outputs.content }}
          claude_args: '--model claude-haiku-4-5 --allowed-tools "Read,Write,Bash(gh pr diff:*)"'

      - name: Read Claude result
        id: read
        run: |
          if [ ! -f /tmp/pr-review-result.json ]; then
            echo "Claude did not produce /tmp/pr-review-result.json" >&2
            exit 1
          fi

          cat /tmp/pr-review-result.json

          NEEDS_REVIEW=$(jq -r .needs_review /tmp/pr-review-result.json)
          IMPACT=$(jq -r .impact /tmp/pr-review-result.json)
          REASON=$(jq -r .reason /tmp/pr-review-result.json)

          echo "needs_review=$NEEDS_REVIEW" >> "$GITHUB_OUTPUT"
          echo "impact=$IMPACT" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

  post-review-status:
    name: Post review status to PR
    needs: [static-deny, static-allow, dynamic-judge]
    if: >
      always() &&
      (needs.static-deny.outputs.denied == 'true' ||
       needs.static-allow.outputs.approved == 'true' ||
       needs.dynamic-judge.outputs.needs_review != '')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for scripts)
        uses: actions/checkout@v4

      - name: Post review status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          DENY_DENIED: ${{ needs.static-deny.outputs.denied }}
          DENY_REASON: ${{ needs.static-deny.outputs.reason }}
          ALLOW_APPROVED: ${{ needs.static-allow.outputs.approved }}
          DYNAMIC_NEEDS_REVIEW: ${{ needs.dynamic-judge.outputs.needs_review }}
          DYNAMIC_IMPACT: ${{ needs.dynamic-judge.outputs.impact }}
          DYNAMIC_REASON: ${{ needs.dynamic-judge.outputs.reason }}
        run: |
          chmod +x .github/scripts/post-review-status.sh
          .github/scripts/post-review-status.sh
