name: PR Review Judge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  check-draft:
    name: Check draft (gate)
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - run: echo "PR is not draft. Proceeding to judgment pipeline."

  detect-changes:
    name: Detect changes and match paths
    needs: check-draft
    runs-on: ubuntu-latest
    outputs:
      denied: ${{ steps.decide.outputs.denied }}
      approved: ${{ steps.decide.outputs.approved }}
      reason: ${{ steps.decide.outputs.reason }}
    steps:
      - name: Match changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: json
          filters: |
            all:
              - '**'
            deny:
              - '.github/workflows/**'
            allow:
              - '**/*.md'
              - 'public/**'
              - '.gitignore'

      - name: Decide verdict
        id: decide
        env:
          ALL_FILES_JSON: ${{ steps.filter.outputs.all_files }}
          DENY_FILES_JSON: ${{ steps.filter.outputs.deny_files }}
          ALLOW_FILES_JSON: ${{ steps.filter.outputs.allow_files }}
        run: |
          ALL=$(echo "$ALL_FILES_JSON" | jq -r '.[]' | sort -u)
          DENY=$(echo "$DENY_FILES_JSON" | jq -r '.[]' | sort -u)
          ALLOW=$(echo "$ALLOW_FILES_JSON" | jq -r '.[]' | sort -u)

          echo "All changed files:"
          echo "$ALL"
          echo "--"
          echo "Deny matches:"
          echo "$DENY"
          echo "--"
          echo "Allow matches:"
          echo "$ALLOW"

          if [ -n "$DENY" ]; then
            FIRST=$(echo "$DENY" | head -3 | tr '\n' ' ' | sed 's/ $//')
            echo "denied=true" >> "$GITHUB_OUTPUT"
            echo "approved=false" >> "$GITHUB_OUTPUT"
            echo "reason=critical path への変更があります: $FIRST" >> "$GITHUB_OUTPUT"
          elif [ -z "$ALL" ]; then
            echo "denied=false" >> "$GITHUB_OUTPUT"
            echo "approved=false" >> "$GITHUB_OUTPUT"
          else
            # Subset check: are all changed files covered by the allow filter?
            UNSAFE=$(comm -23 <(echo "$ALL") <(echo "$ALLOW"))
            if [ -z "$UNSAFE" ]; then
              echo "denied=false" >> "$GITHUB_OUTPUT"
              echo "approved=true" >> "$GITHUB_OUTPUT"
            else
              echo "Files outside whitelist:"
              echo "$UNSAFE"
              echo "denied=false" >> "$GITHUB_OUTPUT"
              echo "approved=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  dynamic-judge:
    name: Dynamic judge (Claude)
    needs: detect-changes
    if: >
      needs.detect-changes.outputs.denied == 'false' &&
      needs.detect-changes.outputs.approved == 'false'
    runs-on: ubuntu-latest
    outputs:
      verdict: ${{ steps.read.outputs.verdict }}
      impact: ${{ steps.read.outputs.impact }}
      reason: ${{ steps.read.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load prompt
        id: load_prompt
        run: |
          {
            echo "content<<PROMPT_EOF"
            cat .github/pr-review/dynamic-judge.md
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude review judge
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ steps.load_prompt.outputs.content }}
          claude_args: '--model claude-haiku-4-5 --allowed-tools "Read,Write,Bash(gh pr diff:*)"'

      - name: Read verdict
        id: read
        run: |
          if [ ! -f /tmp/claude-verdict.json ]; then
            echo "Claude did not produce /tmp/claude-verdict.json" >&2
            exit 1
          fi

          cat /tmp/claude-verdict.json

          VERDICT=$(jq -r .verdict /tmp/claude-verdict.json)
          IMPACT=$(jq -r .impact /tmp/claude-verdict.json)
          REASON=$(jq -r .reason /tmp/claude-verdict.json)

          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "impact=$IMPACT" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

  apply-result:
    name: Apply judgment to PR
    needs: [detect-changes, dynamic-judge]
    if: >
      always() &&
      (needs.detect-changes.outputs.denied == 'true' ||
       needs.detect-changes.outputs.approved == 'true' ||
       needs.dynamic-judge.outputs.verdict != '')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for scripts)
        uses: actions/checkout@v4

      - name: Apply judgment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          DENY_DENIED: ${{ needs.detect-changes.outputs.denied }}
          DENY_REASON: ${{ needs.detect-changes.outputs.reason }}
          ALLOW_APPROVED: ${{ needs.detect-changes.outputs.approved }}
          DYNAMIC_VERDICT: ${{ needs.dynamic-judge.outputs.verdict }}
          DYNAMIC_IMPACT: ${{ needs.dynamic-judge.outputs.impact }}
          DYNAMIC_REASON: ${{ needs.dynamic-judge.outputs.reason }}
        run: |
          chmod +x .github/scripts/apply-judgment.sh
          .github/scripts/apply-judgment.sh
