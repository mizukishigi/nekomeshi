name: PR Review Judge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  check-draft:
    name: Check draft (gate)
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - run: echo "PR is not draft. Proceeding to judgment pipeline."

  detect-changes:
    name: Detect changed files
    needs: check-draft
    runs-on: ubuntu-latest
    outputs:
      changed_files: ${{ steps.detect.outputs.files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: detect
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin "$BASE_REF" --depth=1
          CHANGED=$(git diff --name-only "origin/$BASE_REF...HEAD")
          echo "Changed files:"
          echo "$CHANGED"
          {
            echo "files<<CHANGED_FILES_EOF"
            echo "$CHANGED"
            echo "CHANGED_FILES_EOF"
          } >> "$GITHUB_OUTPUT"

  static-deny:
    name: Static deny (critical paths)
    needs: detect-changes
    runs-on: ubuntu-latest
    outputs:
      denied: ${{ steps.check.outputs.denied }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - name: Checkout (sparse, config only)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/pr-review
          sparse-checkout-cone-mode: false

      - name: Match against deny-paths.txt
        id: check
        env:
          CHANGED: ${{ needs.detect-changes.outputs.changed_files }}
        run: |
          DENY_FILE=.github/pr-review/deny-paths.txt
          PATTERNS=$(grep -vE '^(#|$)' "$DENY_FILE" | paste -sd '|' -)

          if [ -z "$PATTERNS" ]; then
            echo "deny-paths.txt is empty, skipping"
            echo "denied=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MATCHED=$(echo "$CHANGED" | grep -E "$PATTERNS" || true)

          if [ -n "$MATCHED" ]; then
            echo "Matched files:"
            echo "$MATCHED"
            REASON="critical path への変更があります: $(echo "$MATCHED" | head -3 | tr '\n' ' ' | sed 's/ $//')"
            echo "denied=true" >> "$GITHUB_OUTPUT"
            echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          else
            echo "denied=false" >> "$GITHUB_OUTPUT"
          fi

  static-allow:
    name: Static allow (trivial paths)
    needs: [detect-changes, static-deny]
    if: needs.static-deny.outputs.denied == 'false'
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - name: Checkout (sparse, config only)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/pr-review
          sparse-checkout-cone-mode: false

      - name: Match against allow-paths.txt
        id: check
        env:
          CHANGED: ${{ needs.detect-changes.outputs.changed_files }}
        run: |
          ALLOW_FILE=.github/pr-review/allow-paths.txt
          PATTERNS=$(grep -vE '^(#|$)' "$ALLOW_FILE" | paste -sd '|' -)

          if [ -z "$CHANGED" ] || [ -z "$PATTERNS" ]; then
            echo "No changed files or empty whitelist"
            echo "approved=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          UNSAFE=$(echo "$CHANGED" | grep -vE "$PATTERNS" || true)

          if [ -z "$UNSAFE" ]; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
          else
            echo "approved=false" >> "$GITHUB_OUTPUT"
            echo "Files outside whitelist:"
            echo "$UNSAFE"
          fi

  dynamic-judge:
    name: Dynamic judge (Claude)
    needs: [static-deny, static-allow]
    if: >
      needs.static-deny.outputs.denied == 'false' &&
      needs.static-allow.outputs.approved == 'false'
    runs-on: ubuntu-latest
    outputs:
      verdict: ${{ steps.read.outputs.verdict }}
      impact: ${{ steps.read.outputs.impact }}
      reason: ${{ steps.read.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load prompt
        id: load_prompt
        run: |
          {
            echo "content<<PROMPT_EOF"
            cat .github/pr-review/dynamic-judge.md
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude review judge
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ steps.load_prompt.outputs.content }}
          claude_args: '--model claude-haiku-4-5 --allowed-tools "Read,Write,Bash(gh pr diff:*)"'

      - name: Read verdict
        id: read
        run: |
          if [ ! -f /tmp/claude-verdict.json ]; then
            echo "Claude did not produce /tmp/claude-verdict.json" >&2
            exit 1
          fi

          cat /tmp/claude-verdict.json

          VERDICT=$(jq -r .verdict /tmp/claude-verdict.json)
          IMPACT=$(jq -r .impact /tmp/claude-verdict.json)
          REASON=$(jq -r .reason /tmp/claude-verdict.json)

          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "impact=$IMPACT" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

  apply-result:
    name: Apply judgment to PR
    needs: [static-deny, static-allow, dynamic-judge]
    if: >
      always() &&
      (needs.static-deny.outputs.denied == 'true' ||
       needs.static-allow.outputs.approved == 'true' ||
       needs.dynamic-judge.outputs.verdict != '')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for scripts)
        uses: actions/checkout@v4

      - name: Apply judgment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          DENY_DENIED: ${{ needs.static-deny.outputs.denied }}
          DENY_REASON: ${{ needs.static-deny.outputs.reason }}
          ALLOW_APPROVED: ${{ needs.static-allow.outputs.approved }}
          DYNAMIC_VERDICT: ${{ needs.dynamic-judge.outputs.verdict }}
          DYNAMIC_IMPACT: ${{ needs.dynamic-judge.outputs.impact }}
          DYNAMIC_REASON: ${{ needs.dynamic-judge.outputs.reason }}
        run: |
          chmod +x .github/scripts/apply-judgment.sh
          .github/scripts/apply-judgment.sh
